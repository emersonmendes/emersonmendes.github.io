<!DOCTYPE html>
<html>
<head>
    <title>Test Terminal</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.4.2/jquery.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #test { margin-top: 20px; color: #0bc; }
    </style>
</head>
<body>
    <div id="output">Testing keyboard input...</div>
    <div id="test"></div>
    
    <script>
        $(document).ready(function() {
            var input = "";
            
            $("#output").append("<br/>Type something: <span id='input'></span><span id='cursor'>|</span>");
            
            $(document).on("keydown", function(e) {
                var key = e.which || e.keyCode;
                $("#test").text("keydown: " + key);
                
                if (key == 8) { // Backspace
                    e.preventDefault();
                    input = input.slice(0, -1);
                    $("#input").text(input);
                } else if (key == 13) { // Enter
                    e.preventDefault();
                    $("#output").append("<br/>You typed: " + input);
                    input = "";
                    $("#input").text("");
                }
            });
            
            $(document).on("keypress", function(e) {
                var key = e.which || e.keyCode;
                $("#test").text("keypress: " + key + " = " + String.fromCharCode(key));
                
                if (key >= 32) {
                    var char = String.fromCharCode(key);
                    input += char;
                    $("#input").text(input);
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
