<html>

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <title>Emerson Mendes</title>
        <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.4.2/jquery.min.js"></script>
        <link rel="stylesheet" type="text/css" href="index.css">
    </head>

    <body>
        <div class="scene">
            <div class="monitor">
                <div class="monitor-case">
                    <div class="monitor-bezel">
                        <div class="crt-screen">
                            <div class="crt-inner">
                                <div class="crt-content" id="crt-content" tabindex="0">
                                    <div id="console"></div>
                                </div>
                                <div class="crt-scrollbar" id="crt-scrollbar" aria-hidden="true">
                                    <div class="crt-scrollbar-track">
                                        <button type="button" class="crt-scrollbar-thumb" id="crt-scrollbar-thumb" tabindex="-1"></button>
                                    </div>
                                </div>
                            </div>
                            <div class="scanlines" aria-hidden="true"></div>
                        </div>
                    </div>
                </div>
                <div class="monitor-neck"></div>
                <div class="monitor-base"></div>
            </div>
        </div>
        <!-- Mobile: foco aqui abre o teclado virtual; valor é espelhado no terminal (só CSS/JS mobile) -->
        <input type="text" id="terminal-mobile-input" class="terminal-mobile-input"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            enterkeyhint="go" inputmode="text" aria-label="Entrada do terminal"
            placeholder="Toque na tela ou aqui para abrir o teclado">
        <script type="text/javascript" src="index.js"></script>
    </body>

</html>
